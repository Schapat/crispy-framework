name: Harness CLI Release

on:
  push:
    tags:
      - "harness-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example harness-cli-v0.1.9"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: harness-cli
            artifact: harness-cli-linux-x64
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: harness-cli
            artifact: harness-cli-macos-arm64
          - platform: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            binary: harness-cli
            artifact: harness-cli-macos-x64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: harness-cli.exe
            artifact: harness-cli-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --package harness-cli --release --target "${{ matrix.target }}"

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          chmod 755 "dist/${{ matrix.artifact }}"
          shasum -a 256 "dist/${{ matrix.artifact }}" | sed 's#dist/##' > "dist/${{ matrix.artifact }}.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          $hash = (Get-FileHash "dist/${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Set-Content -NoNewline "dist/${{ matrix.artifact }}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Harness CLI ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: true
